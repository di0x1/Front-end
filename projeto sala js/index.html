<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Bicho</title>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    body {
      transition: background-image 1.5s ease-in-out;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.75; }
    }
    .flicker { animation: flicker 0.6s ease-in-out infinite; }

    @keyframes pulse-red {
      0%, 100% { filter: drop-shadow(0 0 0px #ff2200); }
      50%       { filter: drop-shadow(0 0 18px #ff2200cc); }
    }
    .agonizando { animation: pulse-red 0.8s ease-in-out infinite; }
  </style>
</head>

<body
  class="min-h-screen flex flex-col"
  style="
    background-image: url('background.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  "
>

  <div class="w-full flex items-center justify-between p-4 gap-4"
       style="background: rgba(20,0,0,0.65); backdrop-filter: blur(6px); border-radius: 0 0 1rem 1rem;">

    <div class="flex items-center gap-4">
      <div class="avatar">
        <div class="w-16 rounded-full ring ring-error ring-offset-base-100 ring-offset-2">
          <img src="Diabocomendo.png" alt="avatar" />
        </div>
      </div>

      <input
        type="text"
        placeholder="Nome do demônio..."
        class="input input-error input-bordered w-48 text-red-200 placeholder-red-400"
        style="background: rgba(80,0,0,0.5);"
      />
    </div>

    <label class="flex items-center gap-2 cursor-pointer select-none text-red-300 text-sm font-bold">
      🔥 Escaldante
      <input
        type="checkbox"
        id="toggleNoite"
        class="toggle toggle-error"
        onchange="alternarFundo()"
      />
      🌑 Sombrio
    </label>
  </div>

  <div class="flex flex-col items-center justify-center flex-1 w-full px-4 py-8">

    <div id="statusBadge" class="badge badge-error badge-lg mb-4 text-base font-bold">
      Vagando pelo Inferno
    </div>

    <img
      id="main"
      src="Diabo.png"
      alt="Diabo"
      class="w-full max-w-xs h-auto transition-all duration-300"
      style="filter: drop-shadow(0 0 12px #ff440088);"
    />

    <div class="mt-10 flex justify-center w-full">
      <img
        id="btn"
        src="pimenta.png"
        alt="Alimentar"
        class="w-1/3 max-w-[160px] h-auto cursor-pointer active:scale-90 transition-transform duration-150"
        style="filter: drop-shadow(0 0 8px #ff220099);"
        onclick="alimentar()"
      />
    </div>

    <div class="mt-6 w-full max-w-xs">
      <div class="flex justify-between text-xs mb-1 text-red-300 font-semibold">
        <span>🔥 Chama Interior</span>
        <span id="contadorLabel">0s</span>
      </div>
      <progress id="barraFome" class="progress progress-error w-full" value="100" max="100"></progress>
    </div>
  </div>

  <!-- Botão secreto do Ferlini procure dacio procure... -->
  <button
    onclick="document.getElementById('modalFerlini').showModal()"
    style="position:fixed; bottom:8px; right:8px; width:30px; height:30px;
    opacity:0.08; cursor:pointer; background:transparent; border:none;"
  ></button>

  <dialog id="modalFerlini" class="modal">
    <div class="modal-box text-center" style="background:#1a0000; border:1px solid #ff2200;">
      <h3 class="font-bold text-lg mb-2 text-red-400">👿 O Verdadeiro Demônio 👿</h3>
      <img
        src="ferlini.jpg"
        alt="Ferlini"
        class="rounded-xl mx-auto max-w-xs"
        onerror="this.alt='Foto não encontrada 😔'; this.removeAttribute('src')"
      />
      <div class="modal-action justify-center">
        <form method="dialog">
          <button class="btn btn-error text-white">Fugir 🔥</button>
        </form>
      </div>
    </div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>

<DOCTYPE html>
<html lang = "pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CAIXA LIVRE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .topo{
            background-color: #ffc107;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            border: 4px solid #00115c;
        }

        .painel{
            background-color: #5a5b5f;
            padding: 10;
            margin-bottom: 10px;
            border: 3px solid #000000;
            color: white;
        }
    </style>
</head>

<body class="bg-primary bg-gradient">
    <div id="Alert"><br></div>

    <div class="container mt-3">
        <div class="topo"> CAIXA LIVRE </div>

        <div class="row mt-3">
            <div class="col-md-7">
                <h3 class="text-white"><span class="badge text-bg-primary"> SUA COMPRA</span></h3>
                <ul id="lista" class="list-group lista"></ul>
            </div>

        <div class="col-md-5">
            <div class="painel"> TOTAL: R$ <span id="TOTAL">0.00</span></div>

            <div class="painel">
                <label>CODIGO DE BARRAS</label>
                <input type="text" id="cod" class="from-control">
            </div>

            <div class="painel">
                <label> QUANTIDADE </label>
                <input type="text" id="cod" class="from-control" value="1">
            </div>

            <div class="painel">
                <label> QUANTIDADE X VALOR </label>
                <div class="alert alert-light" role="alert">
                    <span id="qtdXun">0.00</span>

                </div>

                <button class="btn btn-success w-100" onclick="addProduto()">
                    Adicionar Produto
                </button>
            </div>

        </div>

    </div>
</body>
</html>
